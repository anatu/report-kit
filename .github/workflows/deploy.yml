name: Deploy to GitHub Pages

# Buildless: this uploads the repo as-is (it's already static HTML).
# Enable once under repo Settings → Pages → Source: "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes cancel in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          # Whole repo is the site. To publish a subfolder, set e.g. ./public
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
